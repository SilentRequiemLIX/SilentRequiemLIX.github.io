          <div class="post-info post-detail-info">
            <span><i class="icon-calendar-outline"></i> 2026-03-11</span>
            
          </div>
          <div class="post-content" v-pre>
            <p>步骤1：按Windows+R键，打开运行窗口，键入以下命令：</p>
<pre><code>lusrmgr.msc
</code></pre>
<p>步骤2：在弹出的窗口中，双击“用户”，然后双击“Administrator”，将账户已禁用取消打勾即可，按应用确定按返回<br>
步骤3：返回桌面。按alt+F4键，弹出的窗口下拉选择注销。然后在Windows登陆界面选择Administrator账户即可，然后把原来的账户删了就行</p>
